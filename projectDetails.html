<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Project Details</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#eef3fb;
color:#333;
}

nav{
background:#1e3a8a;
color:white;
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:50px 20px;
}

.project-box{
background:white;
padding:45px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.project-box h1{
font-size:42px;
color:#1e3a8a;
margin-bottom:25px;
}

.info-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
margin:30px 0;
}

.info-card{
background:#f8fbff;
padding:20px;
border-radius:15px;
}

.info-card h3{
color:#2563eb;
margin-bottom:10px;
}

.section{
margin-top:40px;
}

.section h2{
margin-bottom:15px;
color:#1e3a8a;
}

.actions{
margin-top:35px;
}

.actions button{
padding:14px 24px;
border:none;
margin-right:15px;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

.actions button:hover{
background:#1d4ed8;
}

.resource-links a{
display:inline-block;
margin:10px 15px 10px 0;
background:#10b981;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:10px;
}

.comments{
margin-top:50px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.05);
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:12px;
margin-top:15px;
}

.comment{
background:#f1f5f9;
padding:20px;
margin-top:15px;
border-radius:12px;
}

</style>
</head>
<body>


<nav>
<h2>InsightHub</h2>

<div>
<a href="index.html">Home</a>
<a href="submit.html">Submit</a>
<a href="admin.html">Admin</a>
</div>
</nav>



<div class="container">

<div id="projectContainer"></div>


<div class="comments">

<h2>User Comments & Feedback</h2>

<textarea
id="commentText"
placeholder="Leave feedback..."
></textarea>

<br><br>

<button onclick="addComment()">
Post Comment
</button>

<div id="commentsBox"></div>

</div>

</div>



<script>


const params =
new URLSearchParams(
window.location.search
);

const projectId=
params.get("id");



const projects={

1:{
title:"AI Attendance System",
student:"David Akanni",
department:"Computer Science",
supervisor:"Dr Mensah",
year:"2025",
technology:"Node.js, PostgreSQL, Face Recognition",
abstract:"An intelligent attendance management platform using facial recognition.",

problem:
"Manual attendance systems are inefficient and prone to fraud.",

methodology:
"Machine learning facial detection with Node backend and PostgreSQL storage.",

results:
"Reduced attendance fraud by 80% in test deployment.",

keywords:
"Artificial Intelligence, Biometrics, Automation",

pdf:"#",
video:"#"
},

2:{
title:"E-Commerce Inventory System",
student:"John Mensah",
department:"Information Systems",
supervisor:"Prof Owusu",
year:"2025",
technology:"JavaScript, SQL, Bootstrap",

abstract:"Inventory tracking system for SMEs.",

problem:
"Businesses struggle with stock monitoring.",

methodology:
"Web-based inventory management platform.",

results:
"Improved stock tracking and reduced losses.",

keywords:
"E-Commerce, Inventory, Business",

pdf:"#",
video:"#"
},

3:{
title:"Library Recommendation System",
student:"Sarah Boateng",
department:"Software Engineering",
supervisor:"Dr Adjei",
year:"2025",
technology:"Python, AI, PostgreSQL",

abstract:"Recommendation engine for academic resources.",

problem:
"Students struggle finding relevant materials.",

methodology:
"AI recommendation algorithm based on interests.",

results:
"Better resource discovery for students.",

keywords:
"Machine Learning, Recommendations",

pdf:"#",
video:"#"
}

};



function loadProject(){

let p=
projects[projectId] || projects[1];

document.getElementById(
"projectContainer"
).innerHTML=`

<div class="project-box">

<h1>
${p.title}
</h1>


<div class="info-grid">

<div class="info-card">
<h3>Student Name</h3>
<p>${p.student}</p>
</div>

<div class="info-card">
<h3>Department</h3>
<p>${p.department}</p>
</div>

<div class="info-card">
<h3>Supervisor</h3>
<p>${p.supervisor}</p>
</div>

<div class="info-card">
<h3>Year</h3>
<p>${p.year}</p>
</div>

<div class="info-card">
<h3>Technology Used</h3>
<p>${p.technology}</p>
</div>

<div class="info-card">
<h3>Keywords</h3>
<p>${p.keywords}</p>
</div>

</div>


<div class="section">
<h2>Project Abstract</h2>
<p>${p.abstract}</p>
</div>


<div class="section">
<h2>Problem Statement</h2>
<p>${p.problem}</p>
</div>


<div class="section">
<h2>Methodology</h2>
<p>${p.methodology}</p>
</div>


<div class="section">
<h2>Results / Findings</h2>
<p>${p.results}</p>
</div>



<div class="section">
<h2>Resources</h2>

<div class="resource-links">

<a href="${p.pdf}">
Download Full Report
</a>

<a href="${p.video}">
Watch Demo
</a>

</div>

</div>


<div class="actions">

<button onclick="bookmarkProject()">
Save Project
</button>

<button onclick="requestAccess()">
Contact Author
</button>

</div>

</div>

`;

}



function bookmarkProject(){

alert(
"Project saved to bookmarks"
);

}


function requestAccess(){

alert(
"Author contact request sent"
);

}



function addComment(){

let text=
document.getElementById(
"commentText"
).value;

if(!text) return;

document.getElementById(
"commentsBox"
).innerHTML += `

<div class="comment">
<h4>Research User</h4>
<p>${text}</p>
</div>

`;

document.getElementById(
"commentText"
).value="";

}




loadProject();

</script>

</body>
</html>
